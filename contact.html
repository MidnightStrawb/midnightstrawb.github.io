<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="contact-container">

    <h1 class="title">Contact Me</h1>
    <p class="subtitle">xxxxxxx</p>

    <div class="contact-grid">

        <!-- LEFT SIDE -->
        <div class="contact-info fade-in">
            <h2>Get in touch</h2>
            <p>xxxxxxxx</p>

            <div class="buttons">
                <a href="https://discord.com/" class="btn discord">Message on Discord</a>
                <a href="mailto:midnight@vesselesports.org" class="btn email">Send Email</a>
            </div>
        </div>

        <!-- RIGHT SIDE (FORM) -->
        <form class="contact-form fade-in delay">

            <div class="input-group">
                <input type="text" required>
                <label>Name</label>
            </div>

            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <textarea rows="5" required></textarea>
                <label>Project Details</label>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>

        </form>

    </div>

    <a href="index.html" class="back">← Back to Portfolio</a>

</div>

</body>
</html>
